<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1a2b"/>
      <stop offset="1" stop-color="#1a2a44"/>
    </linearGradient>
    <linearGradient id="fiber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset=".5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="node" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset=".6" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- subtle isometric grid -->
  <g stroke="#22d3ee" stroke-opacity=".08" stroke-width="2">
    <path d="M0 256 L256 128 L512 256 L256 384 Z"/>
    <path d="M0 192 L256 64 L512 192"/>
    <path d="M0 320 L256 448 L512 320"/>
    <path d="M128 96 L128 416"/>
    <path d="M384 96 L384 416"/>
  </g>

  <!-- fiber backbone -->
  <g stroke="url(#fiber)" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M96 360 L200 260 L312 260 L416 152"/>
    <path d="M112 160 L224 260"/>
    <path d="M400 376 L288 260"/>
  </g>

  <!-- DC towers -->
  <g>
    <rect x="72" y="328" width="64" height="72" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="4"/>
    <rect x="82" y="340" width="44" height="8" fill="#22d3ee" opacity=".8"/>
    <rect x="82" y="354" width="44" height="8" fill="#22d3ee" opacity=".6"/>
    <rect x="82" y="368" width="44" height="8" fill="#22d3ee" opacity=".4"/>

    <rect x="376" y="120" width="64" height="72" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="4"/>
    <rect x="386" y="132" width="44" height="8" fill="#8b5cf6" opacity=".8"/>
    <rect x="386" y="146" width="44" height="8" fill="#8b5cf6" opacity=".6"/>
    <rect x="386" y="160" width="44" height="8" fill="#8b5cf6" opacity=".4"/>
  </g>

  <!-- network nodes -->
  <g filter="url(#glow)">
    <circle cx="200" cy="260" r="22" fill="url(#node)"/>
    <circle cx="312" cy="260" r="22" fill="url(#node)"/>
    <circle cx="256" cy="256" r="10" fill="#fde68a"/>
  </g>

  <!-- wordmark accent -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="900" fill="#e2e8f0" text-anchor="middle">
    <text x="256" y="470" font-size="68" letter-spacing="-2">NetTycoon</text>
  </g>
</svg>
