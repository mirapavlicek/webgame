name: Release Build

# Spustí se na každý push tagu v*.v*.v* (např. v0.1.0), nebo ručně z UI.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # pro vytvoření Release + upload artefaktů

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal (Intel + Apple Silicon)
            os: macos-latest
            rust-target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: '--target universal-apple-darwin'
            artifact-glob: 'src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg'

          - name: Windows x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: '--target x86_64-pc-windows-msvc'
            artifact-glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm deps
        run: npm install

      - name: Fetch PixiJS vendor (macOS/Linux)
        if: runner.os != 'Windows'
        run: bash vendor/fetch.sh

      - name: Fetch PixiJS vendor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path 'vendor/fetch.ps1') {
            powershell -ExecutionPolicy Bypass -File vendor/fetch.ps1
          }

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri-args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nettycoon-${{ runner.os }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
